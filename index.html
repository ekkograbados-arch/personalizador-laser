<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Grabado Láser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f4f4f4; }
        .container { max-width:1400px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        h1 { text-align:center; color:#333; }
        .tabs { display:flex; gap:10px; justify-content:center; margin:20px 0; }
        .tab { padding:12px 30px; background:#eee; border:none; border-radius:8px 8px 0 0; cursor:pointer; font-weight:bold; }
        .tab.active { background:#007bff; color:white; }
        .main { display:flex; gap:25px; flex-wrap:wrap; }
        button, input, select { margin:5px 0; padding:10px; border-radius:5px; }
        button { background:#007bff; color:white; border:none; cursor:pointer; }
        button:hover { background:#0056b3; }
        .controls { min-width:320px; }
        .template-btn { width:48%; font-size:14px; margin-bottom:8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Personalizador de Grabado Láser</h1>

        <div class="tabs">
            <button class="tab active" onclick="switchTab(0)">Frente</button>
            <button class="tab" onclick="switchTab(1)">Dorso</button>
        </div>

        <div class="main">
            <div class="canvas-wrapper">
                <canvas id="canvas" width="550" height="550" style="border:2px solid #ccc; border-radius:8px;"></canvas>
            </div>

            <div class="controls">
                <h3>Producto</h3>
                <select id="productSelect" onchange="loadMockup()">
                    <option value="medalla-redonda">Medalla Redonda</option>
                    <option value="medalla-ovalada">Medalla Ovalada</option>
                    <option value="mate-acero">Mate de Acero</option>
                </select>

                <h3>Subir Imagen/Logo</h3>
                <input type="file" id="imageUpload" accept="image/*">

                <h3>Agregar Texto</h3>
                <input type="text" id="textInput" placeholder="Escribe tu frase...">
                <select id="fontSelect"></select>
                <button onclick="addText()">➕ Agregar Texto</button>

                <h3>Plantillas Decorativas</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px; max-height:380px; overflow-y:auto;">
                    <button class="template-btn" onclick="addTemplate(1)">001</button>
                    <button class="template-btn" onclick="addTemplate(2)">002</button>
                    <button class="template-btn" onclick="addTemplate(3)">003</button>
                    <button class="template-btn" onclick="addTemplate(4)">004</button>
                    <button class="template-btn" onclick="addTemplate(5)">005</button>
                    <button class="template-btn" onclick="addTemplate(6)">006</button>
                    <button class="template-btn" onclick="addTemplate(7)">007</button>
                    <button class="template-btn" onclick="addTemplate(8)">008</button>
                    <button class="template-btn" onclick="addTemplate(9)">009</button>
                    <button class="template-btn" onclick="addTemplate(10)">010</button>
                    <button class="template-btn" onclick="addTemplate(11)">011</button>
                    <button class="template-btn" onclick="addTemplate(12)">012</button>
                    <button class="template-btn" onclick="addTemplate(13)">013</button>
                    <button class="template-btn" onclick="addTemplate(14)">014</button>
                    <button class="template-btn" onclick="addTemplate(15)">015</button>
                </div>

                <h3>QR Code</h3>
                <input type="text" id="qrLink" placeholder="https://tuenlace.com">
                <button onclick="addQR()">📱 Generar QR</button>

                <hr>
                <button onclick="applyGrayscale()">🌫️ Convertir todo a Grises</button>
                <button onclick="deleteSelected()">🗑️ Borrar Seleccionado</button>
                <button onclick="clearCurrentSide()">🗑️ Limpiar Este Lado</button>
                <button onclick="exportBothSides()" style="background:#28a745; font-weight:bold;">📥 Descargar Frente + Dorso</button>
            </div>
        </div>
    </div>

    <script>
        let states = { 0: null, 1: null }; // Guardamos el estado JSON de cada lado
        let currentTab = 0;
        let canvas = null;

       // ==================== TUS FUENTES ====================
        const customFonts = [
            { name: "Arial", family: "Arial" },
            { name: "Times New Roman", family: "Times New Roman" },
            { name: "Waltograph", family: "Waltograph", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/fa3023b254c729ef41d870b84bfeab70dc5c5d54/fonts/waltograph42.otf" },
            { name: "Billie James", family: "Billie James", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/BillieJames-Regular.ttf" },
            { name: "Breathing", family: "Breathing", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Breathing%20Personal%20Use%20Only.ttf" },
            { name: "Chocolate", family: "Chocolate", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Chocolate.ttf" },
            { name: "DK Lemon Yellow Sun", family: "DK Lemon Yellow Sun", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/DK%20Lemon%20Yellow%20Sun.otf" },
            { name: "Farmhouse", family: "Farmhouse", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Farmhouse.otf" },
            { name: "High Spirited", family: "High Spirited", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/High%20Spirited.ttf" },
            { name: "LMS Beyond Infinity", family: "LMS Beyond Infinity", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/LMS%20Beyond%20Infinity.ttf" },
            { name: "Milk Water", family: "Milk Water", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Milk%20Water.otf" },
            { name: "Nostalgic Letter", family: "Nostalgic Letter", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Nostalgic%20Letter.otf" },
            { name: "Please Write Me a Song", family: "Please Write Me a Song", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Please%20write%20me%20a%20song.ttf" },
            { name: "Romantic Sunrise", family: "Romantic Sunrise", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Romantic%20Sunrise.otf" },
            { name: "Simple Handmade", family: "Simple Handmade", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/SimpleHandmade.ttf" },
            { name: "Simpsonfont DEMO", family: "Simpsonfont DEMO", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Simpsonfont%20DEMO.otf" },
            { name: "Study Night", family: "Study Night", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Study%20Night.otf" },
            { name: "Study Person", family: "Study Person", url: "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/52f9231774d61702e7c82447a21d254229e7b7f3/fonts/Study%20Person.otf" }
        ];
        const baseUrl = "https://raw.githubusercontent.com/ekkograbados-arch/personalizador-laser/main/templates/";
        function getTemplateUrl(num) {
            return baseUrl + String(num).padStart(3, '0') + ".svg";
        }

        const mockups = {
            "medalla-redonda": "https://picsum.photos/id/1015/600/600",
            "medalla-ovalada": "https://picsum.photos/id/201/600/600",
            "mate-acero": "https://picsum.photos/id/180/600/600"
        };

        function loadCustomFonts() {
            const select = document.getElementById('fontSelect');
            select.innerHTML = '';
            customFonts.forEach(font => {
                const option = document.createElement('option');
                option.value = font.family;
                option.textContent = font.name;
                select.appendChild(option);
                if (font.url) {
                    const style = document.createElement('style');
                    style.innerHTML = `@font-face { font-family: '${font.family}'; src: url('${font.url}') format('truetype'); }`;
                    document.head.appendChild(style);
                }
            });
        }

        function createCanvas() {
            if (canvas) canvas.dispose();
            canvas = new fabric.Canvas('canvas', { preserveObjectStacking: true, enableRetinaScaling: true });
        }

        function switchTab(tab) {
            // Guardar estado actual
            if (canvas) {
                states[currentTab] = canvas.toJSON();
            }
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === tab));

            createCanvas();
            loadMockup();

            // Restaurar estado si existe
            if (states[tab]) {
                canvas.loadFromJSON(states[tab], () => {
                    canvas.renderAll();
                });
            }
        }

        function loadMockup() {
            const product = document.getElementById('productSelect').value;
            fabric.Image.fromURL(mockups[product], img => {
                img.scaleToWidth(550);
                img.selectable = false;
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            });
        }

        // Subir imagen
        document.getElementById('imageUpload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => {
                fabric.Image.fromURL(ev.target.result, img => {
                    img.filters.push(new fabric.Image.filters.Grayscale());
                    img.applyFilters();
                    img.scaleToWidth(200);
                    canvas.add(img);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function addText() {
            const textStr = document.getElementById('textInput').value || "Texto personalizado";
            const fontFamily = document.getElementById('fontSelect').value;
            const text = new fabric.Text(textStr, { left: 150, top: 220, fontSize: 32, fontFamily: fontFamily, fill: '#222' });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addTemplate(num) {
            const url = getTemplateUrl(num);
            fabric.loadSVGFromURL(url, function(objects, options) {
                const obj = fabric.util.groupSVGElements(objects, options);
                obj.scaleToWidth(160);
                obj.set({ left: 180 + Math.random()*100, top: 180 + Math.random()*100 });
                canvas.add(obj);
                canvas.setActiveObject(obj);
                canvas.renderAll();
            });
        }

        async function addQR() {
            let url = document.getElementById('qrLink').value.trim();
            if (!url) return alert("Ingresa un enlace");
            if (!url.startsWith('http')) url = 'https://' + url;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(url)}`;
            fabric.Image.fromURL(qrUrl, img => {
                img.scaleToWidth(160);
                canvas.add(img);
                canvas.setActiveObject(img);
            });
        }

        function applyGrayscale() {
            canvas.getObjects().forEach(obj => {
                if (obj.type === 'image') {
                    obj.filters = [new fabric.Image.filters.Grayscale()];
                    obj.applyFilters();
                }
            });
            canvas.renderAll();
        }

        function deleteSelected() {
            const active = canvas.getActiveObject();
            if (active) canvas.remove(active);
        }

        function clearCurrentSide() {
            if (confirm("¿Limpiar este lado?")) {
                canvas.clear();
                loadMockup();
            }
        }

        function exportBothSides() {
            // Guardar estado actual
            states[currentTab] = canvas.toJSON();

            // Exportar Frente
            if (states[0]) {
                const tempCanvas = new fabric.Canvas(null, { width: 550, height: 550 });
                tempCanvas.loadFromJSON(states[0], () => {
                    const link1 = document.createElement('a');
                    link1.download = 'grabado-frente.png';
                    link1.href = tempCanvas.toDataURL({ format: 'png', multiplier: 2 });
                    link1.click();
                });
            }

            setTimeout(() => {
                if (states[1]) {
                    const tempCanvas2 = new fabric.Canvas(null, { width: 550, height: 550 });
                    tempCanvas2.loadFromJSON(states[1], () => {
                        const link2 = document.createElement('a');
                        link2.download = 'grabado-dorso.png';
                        link2.href = tempCanvas2.toDataURL({ format: 'png', multiplier: 2 });
                        link2.click();
                    });
                }
            }, 600);
        }

        window.onload = () => {
            loadCustomFonts();
            createCanvas();
            loadMockup();
        };
    </script>
</body>
</html>
