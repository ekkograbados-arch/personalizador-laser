<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador de Grabado Láser - Prototipo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; }
        .main {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .canvas-container {
            border: 2px solid #ddd;
            background: #fff;
            position: relative;
        }
        .controls {
            min-width: 280px;
        }
        button, input, select {
            margin: 8px 0;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        .preview {
            text-align: center;
            margin-top: 20px;
        }
        #canvas {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Personalizador de Grabado Láser</h1>
        <p style="text-align:center;">Prototipo básico - Medalla de ejemplo</p>
        
        <div class="main">
            <!-- Canvas -->
            <div>
                <div class="canvas-container">
                    <canvas id="canvas" width="600" height="600"></canvas>
                </div>
                <div class="preview">
                    <button onclick="exportDesign()">📥 Descargar diseño final (PNG)</button>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <h2>Controles</h2>
                
                <!-- Subir Mockup -->
                <label>1. Cargar Mockup de Medalla (fondo)</label><br>
                <input type="file" id="mockupUpload" accept="image/*">
                
                <!-- Subir Imagen para grabado -->
                <label>2. Subir Imagen / Logo</label><br>
                <input type="file" id="imageUpload" accept="image/*">
                
                <!-- Texto -->
                <label>3. Agregar Texto</label><br>
                <input type="text" id="textInput" placeholder="Escribe tu frase...">
                <select id="fontSelect">
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                </select>
                <button onclick="addText()">➕ Agregar Texto</button>
                
                <!-- QR -->
                <label>4. Agregar QR (enlace)</label><br>
                <input type="text" id="qrLink" placeholder="https://tudominio.com">
                <button onclick="addQR()">📱 Generar QR</button>
                
                <hr>
                
                <button onclick="clearCanvas()">🗑️ Limpiar todo</button>
                <button onclick="toggleGrayscale()" style="background:#6c757d;">🌗 Modo Escala de Grises (toggle)</button>
                
                <p><strong>💡 Instrucciones:</strong></p>
                <ul style="font-size:0.9em;">
                    <li>Arrastra y suelta elementos</li>
                    <li>Selecciona un objeto para borrarlo con Supr</li>
                    <li>Usa las esquinas para rotar y escalar</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let canvas = new fabric.Canvas('canvas', {
            width: 600,
            height: 600,
            backgroundColor: '#f8f8f8'
        });

        let currentMockup = null;
        let isGrayscaleMode = true;

        // Cargar mockup
        document.getElementById('mockupUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    img.scaleToWidth(600);
                    img.selectable = false; // Fondo fijo
                    img.evented = false;
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                        scaleX: 600 / img.width,
                        scaleY: 600 / img.height
                    });
                });
            };
            reader.readAsDataURL(file);
        });

        // Subir imagen + convertir a gris
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    // Convertir a escala de grises
                    img.filters.push(new fabric.Image.filters.Grayscale());
                    img.applyFilters();
                    img.scaleToWidth(200); // Tamaño inicial razonable
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    canvas.renderAll();
                });
            };
            reader.readAsDataURL(file);
        });

        // Agregar texto
        function addText() {
            const textStr = document.getElementById('textInput').value || "Texto de ejemplo";
            const font = document.getElementById('fontSelect').value;
            
            const text = new fabric.Text(textStr, {
                left: 200,
                top: 250,
                fontSize: 30,
                fontFamily: font,
                fill: '#333',
                editable: true
            });
            
            if (isGrayscaleMode) {
                text.set('fill', '#444');
            }
            
            canvas.add(text);
            canvas.setActiveObject(text);
            canvas.renderAll();
        }

        // Generar QR simple (usando API pública)
        async function addQR() {
            const link = document.getElementById('qrLink').value.trim();
            if (!link) {
                alert("Por favor ingresa un enlace");
                return;
            }
            
            // Usar API gratuita de QR
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
            
            fabric.Image.fromURL(qrUrl, function(img) {
                img.scaleToWidth(150);
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            });
        }

        // Exportar
        function exportDesign() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0,
                multiplier: 2 // Mayor resolución
            });
            
            const link = document.createElement('a');
            link.download = 'diseno-grabado-laser.png';
            link.href = dataURL;
            link.click();
        }

        // Limpiar
        function clearCanvas() {
            if (confirm("¿Limpiar todo el diseño?")) {
                canvas.clear();
                // Restaurar fondo si existía
                canvas.renderAll();
            }
        }

        // Toggle Grayscale (simulado)
        function toggleGrayscale() {
            isGrayscaleMode = !isGrayscaleMode;
            alert("Modo Escala de Grises: " + (isGrayscaleMode ? "Activado" : "Desactivado") + "\n\nEn la versión final se aplicará automáticamente.");
        }

        // Controles de teclado
        document.addEventListener('keydown', function(e) {
            if (e.key === "Delete" || e.key === "Backspace") {
                const active = canvas.getActiveObject();
                if (active) {
                    canvas.remove(active);
                }
            }
        });

        // Inicializar con un mockup de ejemplo (puedes reemplazarlo)
        window.onload = function() {
            // Fondo temporal (círculo como medalla)
            const circle = new fabric.Circle({
                radius: 280,
                fill: '#e0e0e0',
                left: 300,
                top: 300,
                originX: 'center',
                originY: 'center',
                selectable: false,
                evented: false
            });
            canvas.add(circle);
            
            const textDemo = new fabric.Text("Medalla de Ejemplo", {
                left: 150,
                top: 100,
                fontSize: 22,
                fill: '#666'
            });
            canvas.add(textDemo);
            
            console.log("✅ Prototipo cargado. Sube tus imágenes para probar.");
        };
    </script>
</body>
</html>
